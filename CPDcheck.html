    // ─── Donut ────────────────────────────────────────────────────────────────
    function Donut({ earned, target, size=64, stroke=8 }) {
      const r = (size - stroke) / 2;
      const circ = 2 * Math.PI * r;
      const pct = target > 0 ? Math.min(earned / target, 1) : 0;
      const arcColor = target === 0 ? "#5d7497" : pct >= 1 ? "#22c55e" : "#7b68ee";
      const finalOffset = target === 0 ? circ * 0.12 : circ * (1 - pct);
      const c = size / 2;
      const [offset, setOffset] = useState(circ);
      useEffect(() => {
        setOffset(circ);
        const t = setTimeout(() => setOffset(finalOffset), 100);
        return () => clearTimeout(t);
      }, [earned, target]);
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:"rotate(-90deg)"}}>
          <circle cx={c} cy={c} r={r} fill="none" stroke={arcColor} strokeWidth={stroke} opacity={0.2} />
          <circle cx={c} cy={c} r={r} fill="none" stroke={arcColor} strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            style={{transition:"stroke-dashoffset 1s ease-out"}} />
        </svg>
      );
    }

          ...cpdCategories.map(c=>[c.label,c.earned,c.target||"No requirement"]),
          [""],["Completed Education"],["Title","Provider","CPD Points","Date","Type"],
          ...completedEducation.map(i=>[i.title,i.provider,i.cpdPoints,i.completedDate,i.type]),
        ];
        const csv = rows.map(r=>r.map(String).join(",")).join("\n");
        const blob = new Blob([csv],{type:"text/csv"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href=url; a.download="cpd-report.csv"; a.click();
        URL.revokeObjectURL(url);
      }

      return (
        <div style={{display:"flex",flexDirection:"column",gap:"16px"}}>
          {/* Actions */}
          <div style={{display:"flex",justifyContent:"flex-end",gap:"12px"}}>
            <button onClick={handleExport}
              style={{display:"flex",alignItems:"center",gap:"8px",padding:"9px 18px",borderRadius:"10px",border:`1px solid ${T.border}`,background:T.card,fontSize:"14px",fontWeight:500,cursor:"pointer",color:T.text,transition:"border-color 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=T.borderHov} onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
              <IDownload size={15}/> Export Report
            </button>
          </div>

          {/* Annual compliance + categories panel */}
          <div style={{borderRadius:"20px",overflow:"hidden",background:T.cardAlt,border:`1px solid ${T.border}`}}>
            {/* Progress card */}
            <div style={{margin:"12px 12px 0",borderRadius:"16px",background:T.card,padding:"20px 24px 18px",border:`1px solid ${T.border}`}}>
              <p style={{fontSize:"13px",fontWeight:600,margin:"0 0 14px",color:T.muted,textTransform:"uppercase",letterSpacing:"0.06em"}}>Annual Compliance Progress</p>
              <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:"14px"}}>
                <div>
                  <p style={{fontSize:"52px",fontWeight:"bold",color:T.accent,lineHeight:1,margin:0}}>{totalEarned}</p>
                  <p style={{fontSize:"14px",color:T.muted,marginTop:"6px",marginBottom:0}}>
                    of {ANNUAL_CPD_TARGET} <span style={{color:T.accent,fontWeight:600}}>CPD points</span> earned
                  </p>
                </div>
                <div style={{textAlign:"right"}}>
                  <p style={{fontSize:"28px",fontWeight:"bold",color:annualPct>=100?T.green:T.text,margin:0}}>{annualPct}%</p>
                  <p style={{fontSize:"12px",color:T.muted,margin:"2px 0 0"}}>complete</p>
                </div>
              </div>
              <div style={{height:"6px",background:T.border,borderRadius:"9999px",overflow:"hidden"}}>
                <div style={{height:"100%",background:T.accent,borderRadius:"9999px",width:`${annualPct}%`,transition:"width 0.7s"}} />
              </div>
            </div>

            {/* Category grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",padding:"12px"}}>
              {cpdCategories.map(cat => {
                const met = cat.target > 0 && cat.earned >= cat.target;
                const isTax = cat.id === "tax";
                return (
                  <div key={cat.id} style={{borderRadius:"14px",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,padding:"20px 16px",display:"flex",alignItems:"center",gap:"12px",opacity:isTax&&!enabled[cat.id]?0.4:1,transition:"opacity 0.2s"}}>
                    <div style={{position:"relative",flexShrink:0}}>
                      <Donut earned={cat.earned} target={cat.target} size={70} stroke={6} />
                      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <span style={{fontSize:"11px",fontWeight:"bold",color:T.text,lineHeight:1}}>{cat.earned}/{cat.target>0?cat.target:"–"}</span>
                      </div>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:"12px",fontWeight:600,color:T.text,lineHeight:1.3,margin:0}}>{cat.shortLabel}</p>
                      {cat.target > 0
                        ? <p style={{fontSize:"11px",fontWeight:500,marginTop:"4px",marginBottom:0,color:met?T.green:"rgba(123,104,238,0.8)"}}>{met?"Requirement met":`${(cat.target-cat.earned).toFixed(1)} pts to go`}</p>
                        : <p style={{fontSize:"11px",color:T.muted,marginTop:"4px",marginBottom:0}}>No requirement</p>
                      }
                    </div>
                    {isTax && <Toggle on={enabled[cat.id]} onChange={v=>setEnabled(p=>({...p,[cat.id]:v}))} />}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Sub categories */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}}>
            {subCategories.map(sub => (
              <div key={sub.id} style={{display:"flex",alignItems:"center",gap:"8px",borderRadius:"10px",border:`1px solid ${T.border}`,background:T.card,padding:"11px 10px"}}>
                <span style={{flexShrink:0,minWidth:"30px",height:"26px",borderRadius:"6px",border:`1px solid ${sub.earned?T.green:T.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:600,background:sub.earned?T.greenBg:T.cardAlt,color:sub.earned?T.green:T.muted}}>
                  {sub.earned??"–"}
                </span>
                <span style={{fontSize:"12px",lineHeight:1.3,color:T.text}}>{sub.label}</span>
              </div>
            ))}
          </div>

          {/* Completed education */}
          <div style={{marginTop:"8px"}}>
            <p style={{fontSize:"14px",fontWeight:600,marginBottom:"12px",marginTop:0,color:T.text}}>My Completed Education</p>
            <div style={{borderRadius:"16px",border:`1px solid ${T.border}`,background:T.card,overflow:"hidden"}}>
              {/* Table header */}
              <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:"16px",padding:"12px 20px",borderBottom:`1px solid ${T.border}`}}>
                {["Activity","Provider","Points","Date"].map(h => (
                  <span key={h} style={{fontSize:"11px",fontWeight:600,color:T.muted,textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</span>
                ))}
              </div>
              {completedEducation.map((item, i) => (
                <button key={item.id} onClick={()=>onSelectContent?.(item)}
                  style={{width:"100%",textAlign:"left",display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:"16px",alignItems:"center",padding:"14px 20px",background:"none",border:"none",cursor:"pointer",borderBottom:i<completedEducation.length-1?`1px solid ${T.border}`:"none",transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"} onMouseLeave={e=>e.currentTarget.style.background="none"}>
                  <div style={{display:"flex",alignItems:"center",gap:"12px",minWidth:0}}>
                    <TypeIcon type={item.type} />
                    <div style={{minWidth:0}}>
                      <p style={{fontSize:"13px",fontWeight:500,color:T.text,margin:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.title}</p>
                      {item.isImported && <span style={{fontSize:"10px",background:T.accentBg,color:T.accent,padding:"1px 7px",borderRadius:"9999px",fontWeight:600,marginTop:"3px",display:"inline-block"}}>Imported</span>}
                    </div>
                  </div>
                  <span style={{fontSize:"13px",color:T.muted,whiteSpace:"nowrap"}}>{item.provider}</span>
                  <span style={{fontSize:"13px",fontWeight:600,color:T.accent,whiteSpace:"nowrap"}}>{item.cpdPoints} pts</span>
                  <span style={{fontSize:"12px",color:T.muted,whiteSpace:"nowrap"}}>{item.completedDate}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── Library ──────────────────────────────────────────────────────────────
    function Library({ onSelectContent }) {
      const [activeTab, setActiveTab] = useState("all");
      const [category, setCategory] = useState("all");
      const [categoryOpen, setCategoryOpen] = useState(false);

      const categoryOptions = [
        { value:"all",        label:"All Categories"                       },
        { value:"clientCare", label:"Client Care and Practice"             },
        { value:"general",    label:"General"                              },
        { value:"ethics",     label:"Professionalism and Ethics"           },
        { value:"regulatory", label:"Reg Compliance & Consumer Protection" },
        { value:"tax",        label:"Tax (Financial) Advice"               },
        { value:"technical",  label:"Technical Competence"                 },
      ];

      const filtered = useMemo(() => {
        let items = contentItems;
        if (activeTab==="completed")   items=items.filter(i=>i.status==="completed");
        else if (activeTab==="inProgress") items=items.filter(i=>i.status==="inProgress");
        else if (activeTab==="notStarted") items=items.filter(i=>i.status==="notStarted");
        if (category!=="all") {
          const cat = categoryMap[category];
          items=items.filter(i=>i.categories.some(c=>c.name===cat));
        }
        return items;
      }, [activeTab, category]);

      const tabs = [
        {value:"all",label:"All"},{value:"inProgress",label:"In Progress"},
        {value:"notStarted",label:"Not Started"},{value:"completed",label:"Completed"},
      ];

      return (
        <div style={{display:"flex",flexDirection:"column",gap:"20px"}}>
          <div>
            <h1 style={{fontSize:"24px",fontWeight:"bold",margin:"0 0 4px",color:T.text}}>CPD Library</h1>
            <p style={{fontSize:"14px",color:T.muted,margin:0}}>Browse accredited CPD content. Complete the assessment to earn CPD points.</p>
          </div>

          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px"}}>
            <div style={{display:"flex",gap:"6px"}}>
              {tabs.map(t => (
                <button key={t.value} onClick={()=>setActiveTab(t.value)}
                  style={{padding:"7px 16px",borderRadius:"9999px",fontSize:"13px",fontWeight:500,border:`1px solid ${activeTab===t.value?T.accent:T.border}`,background:activeTab===t.value?T.accent:"none",color:activeTab===t.value?"white":T.muted,cursor:"pointer",transition:"all 0.15s"}}>
                  {t.label}
                </button>
              ))}
            </div>
            <div style={{position:"relative",flexShrink:0}}>
              <button onClick={()=>setCategoryOpen(o=>!o)}
                style={{display:"flex",alignItems:"center",gap:"6px",padding:"7px 14px",borderRadius:"10px",border:`1px solid ${T.border}`,background:T.card,fontSize:"13px",fontWeight:500,cursor:"pointer",color:T.text}}>
                {categoryOptions.find(o=>o.value===category)?.label}
                <IChevronD size={14} style={{color:T.muted,transform:categoryOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}/>
              </button>
              {categoryOpen && (
                <div style={{position:"absolute",right:0,top:"44px",zIndex:20,minWidth:"260px",borderRadius:"12px",border:`1px solid ${T.border}`,background:T.card,boxShadow:"0 16px 40px rgba(0,0,0,0.5)",overflow:"hidden",fontSize:"14px"}}>
                  {categoryOptions.map((opt,i) => (
                    <div key={opt.value}>
                      {i>0 && <div style={{height:"1px",background:T.border}} />}
                      <button onClick={()=>{setCategory(opt.value);setCategoryOpen(false);}}
                        style={{width:"100%",textAlign:"left",padding:"11px 16px",background:"none",border:"none",cursor:"pointer",fontWeight:category===opt.value?600:400,color:category===opt.value?T.accent:T.text,transition:"background 0.1s"}}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.04)"} onMouseLeave={e=>e.currentTarget.style.background="none"}>
                        {opt.label}
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {filtered.length===0
            ? <p style={{fontSize:"14px",color:T.muted,padding:"40px 0",textAlign:"center"}}>No activities match your filters.</p>
            : <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"16px"}}>
                {filtered.map(item => <ContentCard key={item.id} item={item} onSelect={()=>onSelectContent(item)} />)}
              </div>
          }
        </div>
      );
    }

    function ContentCard({ item, onSelect }) {
      const tc = typeConfig[item.type] ?? typeConfig.text;
      const Icon = tc.Icon;
      return (
        <div onClick={onSelect}
          style={{borderRadius:"16px",border:`1px solid ${T.border}`,background:T.card,overflow:"hidden",cursor:"pointer",display:"flex",flexDirection:"column",transition:"border-color 0.2s,box-shadow 0.2s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=T.borderHov;e.currentTarget.style.boxShadow="0 8px 32px rgba(0,0,0,0.3)";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.boxShadow="none";}}>
          <div style={{height:"170px",background:T.cardAlt,overflow:"hidden",position:"relative",borderBottom:`1px solid ${T.border}`}}>
            {item.photo
              ? <img src={item.photo} alt={item.title} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} />
              : <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <div style={{height:"72px",width:"72px",borderRadius:"9999px",background:tc.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <Icon size={28} style={{color:tc.color}} />
                  </div>
                </div>
            }
            <div style={{position:"absolute",top:"10px",right:"10px",background:"rgba(0,0,0,0.55)",backdropFilter:"blur(4px)",borderRadius:"8px",padding:"4px 10px",display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",fontWeight:600,color:"white"}}>
              <Icon size={11} style={{color:tc.color}}/> {tc.label}
            </div>
          </div>
          <div style={{padding:"16px",display:"flex",flexDirection:"column",flex:1,gap:"12px"}}>
            <div style={{flex:1}}>
              <h3 style={{fontSize:"14px",fontWeight:700,lineHeight:1.3,margin:"0 0 6px",color:T.text,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{item.title}</h3>
              <p style={{fontSize:"12px",color:T.muted,margin:0,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{item.description}</p>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
              {item.categories.map(cat => (
                <span key={cat.name} style={{fontSize:"11px",background:"rgba(34,197,94,0.1)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.2)",padding:"3px 10px",borderRadius:"9999px",fontWeight:500}}>{cat.name}</span>
              ))}
              <span style={{fontSize:"11px",background:T.accentBg,color:T.accent,border:`1px solid rgba(123,104,238,0.3)`,padding:"3px 10px",borderRadius:"9999px",fontWeight:500}}>{item.cpdPoints} pts</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"12px",fontSize:"12px",color:T.muted,borderTop:`1px solid ${T.border}`,paddingTop:"12px"}}>
              <span style={{display:"flex",alignItems:"center",gap:"4px"}}><IClock size={11}/> {item.duration} min</span>
              <span style={{display:"flex",alignItems:"center",gap:"4px",color:tc.color}}><Icon size={11}/> {tc.label}</span>
            </div>
          </div>
        </div>
      );
    }

    // ─── Content detail ───────────────────────────────────────────────────────
    function ContentDetail({ item, onBack, onStartQuiz }) {
      if (!item) return null;
      const tc = typeConfig[item.type] ?? typeConfig.text;
      const Icon = tc.Icon;
      const primaryCategory = item.categories?.[0]?.name ?? "";
      const statusLabel = {completed:"Completed",inProgress:"In Progress",notStarted:"Not Started"}[item.status] ?? "Not Started";
      const statusColor = {completed:T.green,inProgress:T.orange,notStarted:T.muted}[item.status] ?? T.muted;

      return (
        <div style={{display:"flex",gap:"24px",alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:"20px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px",fontSize:"13px"}}>
              <span style={{display:"flex",alignItems:"center",gap:"6px",color:tc.color,fontWeight:500}}><Icon size={13}/> {tc.label}</span>
              <span style={{color:T.border}}>·</span>
              <span style={{color:T.muted}}>{primaryCategory}</span>
              <span style={{color:T.border}}>·</span>
              <span style={{fontWeight:500,color:statusColor}}>{statusLabel}</span>
            </div>
            <div>
              <h1 style={{fontSize:"28px",fontWeight:"bold",lineHeight:1.2,margin:"0 0 12px",color:T.text}}>{item.title}</h1>
              <p style={{color:T.muted,lineHeight:1.7,margin:0,fontSize:"14px"}}>{item.description}</p>
            </div>

            {item.type==="pdf" ? (
              <div style={{borderRadius:"16px",background:T.cardAlt,border:`1px solid ${T.border}`,height:"260px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"12px"}}>
                  <IFileText size={32} style={{color:T.red}}/>
                  <p style={{fontSize:"14px",fontWeight:600,margin:0,color:T.text}}>PDF Content</p>
                  <p style={{fontSize:"12px",color:T.muted,margin:0}}>Content viewer renders here</p>
                </div>
              </div>
            ) : item.type==="text" ? (
              <div style={{borderRadius:"16px",background:T.cardAlt,border:`1px solid ${T.border}`,height:"260px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"12px"}}>
                  <IBookOpen size={32} style={{color:"#a78bfa"}}/>
                  <p style={{fontSize:"14px",fontWeight:600,margin:0,color:T.text}}>Article Content</p>
                  <p style={{fontSize:"12px",color:T.muted,margin:0}}>Content viewer renders here</p>
                </div>
              </div>
            ) : (
              <div style={{borderRadius:"16px",border:`1px solid ${T.border}`,background:T.card,overflow:"hidden"}}>
                <div style={{background:T.cardAlt,margin:"14px 14px 0",borderRadius:"12px",height:"220px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px"}}>
                  <button style={{height:"52px",width:"52px",borderRadius:"9999px",background:T.accent,display:"flex",alignItems:"center",justifyContent:"center",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(123,104,238,0.4)"}}>
                    <IPlay size={20}/>
                  </button>
                  <span style={{color:T.muted,fontSize:"13px"}}>Click to play</span>
                </div>
                <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:"12px"}}>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",color:T.muted,marginBottom:"8px"}}>
                      <span>0:00</span><span>{String(Math.floor(item.duration)).padStart(2,"0")}:00</span>
                    </div>
                    <div style={{height:"4px",background:T.border,borderRadius:"9999px"}}>
                      <div style={{height:"100%",width:"0%",borderRadius:"9999px",background:T.accent}}/>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                    <button style={{background:"none",border:"none",cursor:"pointer",color:T.muted,display:"flex"}}><ISkipBack size={20}/></button>
                    <button style={{height:"38px",width:"38px",borderRadius:"9999px",background:T.accent,display:"flex",alignItems:"center",justifyContent:"center",border:"none",cursor:"pointer"}}><IPlay size={14}/></button>
                    <button style={{background:"none",border:"none",cursor:"pointer",color:T.muted,display:"flex"}}><ISkipFwd size={20}/></button>
                    <span style={{fontSize:"12px",color:T.muted,fontWeight:500,marginLeft:"4px"}}>1.0x</span>
                    <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:"8px",color:T.muted}}>
                      <IVolume size={16}/>
                      <div style={{height:"4px",width:"100px",background:T.border,borderRadius:"9999px"}}>
                        <div style={{height:"100%",width:"75%",background:T.accent,borderRadius:"9999px"}}/>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <button onClick={()=>onStartQuiz(item)}
              style={{display:"flex",alignItems:"center",gap:"8px",background:T.accent,color:"white",fontWeight:600,padding:"12px 24px",borderRadius:"12px",border:"none",cursor:"pointer",fontSize:"14px",alignSelf:"flex-start",transition:"background 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.background=T.accentHov} onMouseLeave={e=>e.currentTarget.style.background=T.accent}>
              Take Assessment <IArrowR size={16}/>
            </button>
          </div>

          <div style={{width:"272px",flexShrink:0,display:"flex",flexDirection:"column",gap:"14px"}}>
            <div style={{borderRadius:"16px",border:`1px solid ${T.border}`,background:T.card,padding:"20px",display:"flex",flexDirection:"column",gap:"12px"}}>
              <p style={{fontSize:"13px",fontWeight:700,margin:0,color:T.text}}>Course Details</p>
              {[{label:"Provider",value:item.provider},{label:"Duration",value:`${item.duration} min`},{label:"Total CPD Points",value:`${item.cpdPoints} pts`},{label:"Format",value:tc.label},{label:"Category",value:primaryCategory}].map(row => (
                <div key={row.label} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"16px",fontSize:"13px"}}>
                  <span style={{color:T.muted,flexShrink:0}}>{row.label}</span>
                  <span style={{fontWeight:600,textAlign:"right",color:T.text}}>{row.value}</span>
                </div>
              ))}
            </div>
            <div style={{borderRadius:"16px",border:`1px solid ${T.border}`,background:T.card,padding:"20px",display:"flex",flexDirection:"column",gap:"12px"}}>
              <p style={{fontSize:"13px",fontWeight:700,margin:0,color:T.text}}>Points Allocation</p>
              {item.categories?.map(cat => (
                <div key={cat.name} style={{display:"flex",justifyContent:"space-between",fontSize:"13px"}}>
                  <span style={{color:T.muted}}>{cat.name}</span>
                  <span style={{fontWeight:600,color:T.accent}}>{cat.pts.toFixed(2)}</span>
                </div>
              ))}
              <div style={{paddingTop:"10px",borderTop:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",fontSize:"13px"}}>
                <span style={{fontWeight:700,color:T.text}}>Total</span>
                <span style={{fontWeight:700,color:T.accent}}>{item.cpdPoints.toFixed(2)} pts</span>
              </div>
            </div>
            <div style={{borderRadius:"16px",border:`1px solid ${T.border}`,background:T.card,padding:"20px",display:"flex",flexDirection:"column",gap:"12px"}}>
              <p style={{fontSize:"13px",fontWeight:700,margin:0,color:T.text}}>Earn {item.cpdPoints} CPD Points</p>
              <button onClick={()=>onStartQuiz(item)}
                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderRadius:"10px",border:`1px solid ${T.border}`,fontSize:"13px",background:"none",cursor:"pointer",transition:"background 0.15s",color:T.text}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.03)"} onMouseLeave={e=>e.currentTarget.style.background="none"}>
                <span style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.green} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                  Quiz
                </span>
                <span style={{height:"18px",width:"18px",borderRadius:"9999px",border:`2px solid ${T.border}`,display:"inline-block"}}/>
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Quiz ─────────────────────────────────────────────────────────────────
    function Quiz({ item, onBack, onComplete }) {
      const questions = quizQuestions[item?.id ?? ""] ?? [];
      const [current, setCurrent] = useState(0);
      const [selected, setSelected] = useState(null);
      const [answers, setAnswers] = useState([]);
      const [showExp, setShowExp] = useState(false);

      if (!item || questions.length===0) {
        return (
          <div style={{display:"flex",flexDirection:"column",gap:"16px"}}>
            <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:"4px",background:"none",border:"none",cursor:"pointer",fontSize:"14px",color:T.muted,padding:0}}>
              <IChevronL size={16}/> Back
            </button>
            <p style={{color:T.muted}}>No questions available for this activity.</p>
          </div>
        );
      }

      const q = questions[current];
      const progress = Math.round((current / questions.length) * 100);
      const isLast = current === questions.length - 1;

      function handleSelect(idx) {
        if (selected !== null) return;
        setSelected(idx); setShowExp(true);
      }

      function handleNext() {
        const newAnswers = [...answers, {questionId:q.id, selected, correct:q.correct}];
        setAnswers(newAnswers);
        if (isLast) {
          const score = newAnswers.filter(a=>a.selected===a.correct).length;
          onComplete({answers:newAnswers, score, total:questions.length, passed:score/questions.length>=0.7});
        } else {
          setCurrent(c=>c+1); setSelected(null); setShowExp(false);
        }
      }

      return (
        <div style={{display:"flex",flexDirection:"column",gap:"24px",maxWidth:"700px"}}>
          <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:"4px",background:"none",border:"none",cursor:"pointer",fontSize:"14px",color:T.muted,padding:0,alignSelf:"flex-start"}}>
            <IChevronL size={16}/> Back to Activity
          </button>
          <div>
            <h1 style={{fontSize:"20px",fontWeight:"bold",margin:"0 0 4px",color:T.text}}>{item.title}</h1>
            <p style={{fontSize:"14px",color:T.muted,margin:0}}>Assessment · Question {current+1} of {questions.length}</p>
          </div>
          <div style={{height:"5px",background:T.border,borderRadius:"9999px",overflow:"hidden"}}>
            <div style={{height:"100%",background:T.accent,borderRadius:"9999px",width:`${progress}%`,transition:"width 0.3s"}}/>
          </div>
          <div style={{borderRadius:"16px",border:`1px solid ${T.border}`,background:T.card,overflow:"hidden"}}>
            <div style={{padding:"20px 24px",borderBottom:`1px solid ${T.border}`}}>
              <p style={{fontSize:"15px",fontWeight:600,lineHeight:1.4,margin:0,color:T.text}}>{q.question}</p>
            </div>
            <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:"8px"}}>
              {q.options.map((opt, idx) => {
                const isSelected = selected===idx;
                const isCorrect = idx===q.correct;
                const showResult = selected!==null;
                let bg="transparent", border=`1px solid ${T.border}`, color=T.text, opacity=1;
                if (showResult) {
                  if (isCorrect)       { bg=T.greenBg; border=`1px solid rgba(34,197,94,0.4)`; color=T.green; }
                  else if (isSelected) { bg=T.redBg; border=`1px solid rgba(240,70,97,0.4)`; color=T.red; }
                  else                 { opacity=0.4; }
                }
                return (
                  <button key={idx} onClick={()=>handleSelect(idx)} disabled={selected!==null}
                    style={{width:"100%",textAlign:"left",borderRadius:"10px",border,padding:"12px 16px",fontSize:"14px",background:bg,color,opacity,cursor:selected!==null?"default":"pointer",transition:"all 0.15s"}}>
                    <span style={{fontWeight:500,marginRight:"8px"}}>{String.fromCharCode(65+idx)}.</span>{opt}
                  </button>
                );
              })}
              {showExp && q.explanation && (
                <div style={{marginTop:"6px",borderRadius:"10px",background:T.accentBg,border:`1px solid rgba(123,104,238,0.3)`,padding:"12px 16px",fontSize:"14px",color:T.accent}}>
                  <strong>Explanation:</strong> {q.explanation}
                </div>
              )}
              {selected!==null && (
                <button onClick={handleNext}
                  style={{width:"100%",marginTop:"8px",background:T.accent,color:"white",fontWeight:600,padding:"12px",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"14px",transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=T.accentHov} onMouseLeave={e=>e.currentTarget.style.background=T.accent}>
                  {isLast ? "Finish Assessment" : "Next Question"}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── Results ──────────────────────────────────────────────────────────────
    function Results({ result, item, onBack, onGoLibrary }) {
      if (!result) return null;
      const pct = Math.round((result.score / result.total) * 100);
      return (
        <div style={{maxWidth:"440px",margin:"0 auto",paddingTop:"32px"}}>
          <div style={{borderRadius:"20px",border:`1px solid ${T.border}`,background:T.card,padding:"36px 28px",display:"flex",flexDirection:"column",alignItems:"center",gap:"20px",textAlign:"center"}}>
            <div style={{height:"76px",width:"76px",borderRadius:"9999px",display:"flex",alignItems:"center",justifyContent:"center",background:result.passed?T.greenBg:T.redBg}}>
              {result.passed ? <ICheck size={32} style={{color:T.green}}/> : <IXmark size={32} style={{color:T.red}}/>}
            </div>
            <div>
              <h1 style={{fontSize:"22px",fontWeight:"bold",margin:"0 0 4px",color:T.text}}>{result.passed ? "Assessment Passed!" : "Not Quite There"}</h1>
              <p style={{fontSize:"13px",color:T.muted,margin:0}}>{item?.title}</p>
            </div>
            <div style={{fontSize:"44px",fontWeight:"bold",color:T.text}}>{pct}%</div>
            <p style={{fontSize:"14px",color:T.muted,margin:0}}>{result.score} of {result.total} questions correct</p>
            {result.passed && item?.cpdPoints && (
              <div style={{display:"flex",alignItems:"center",gap:"8px",borderRadius:"9999px",background:T.greenBg,border:`1px solid rgba(34,197,94,0.3)`,padding:"8px 18px",fontSize:"14px",color:T.green,fontWeight:500}}>
                <IAward size={14}/> {item.cpdPoints} CPD points earned
              </div>
            )}
            {!result.passed && (
              <p style={{fontSize:"14px",color:T.muted,margin:0}}>A score of 70% or higher is required to pass. Review the material and try again.</p>
            )}
            <div style={{display:"flex",gap:"12px",width:"100%",paddingTop:"8px"}}>
              {!result.passed && (
                <button onClick={onBack} style={{flex:1,background:"none",border:`1px solid ${T.border}`,color:T.text,fontWeight:600,padding:"12px",borderRadius:"10px",cursor:"pointer",fontSize:"14px",transition:"border-color 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=T.borderHov} onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>Retry</button>
              )}
              <button onClick={onGoLibrary} style={{flex:1,background:T.accent,color:"white",fontWeight:600,padding:"12px",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"14px",transition:"background 0.15s"}}
                onMouseEnter={e=>e.currentTarget.style.background=T.accentHov} onMouseLeave={e=>e.currentTarget.style.background=T.accent}>
                {result.passed ? "Back to Library" : "Back to Activity"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Profile ──────────────────────────────────────────────────────────────
    function Profile({ user, onUpdate }) {
      const [name, setName] = useState(user?.name ?? "");
      const [email, setEmail] = useState(user?.email ?? "");
      const [role, setRole] = useState(user?.role ?? "");
      const [saved, setSaved] = useState(false);

      function handleSave(e) {
        e.preventDefault();
        onUpdate({...user, name, email, role});
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      }

      const inputStyle = {borderRadius:"10px",border:`1px solid ${T.border}`,background:T.cardAlt,padding:"10px 14px",fontSize:"14px",outline:"none",width:"100%",color:T.text,transition:"border-color 0.15s"};

      return (
        <div style={{maxWidth:"580px",display:"flex",flexDirection:"column",gap:"24px"}}>
          <div>
            <h1 style={{fontSize:"24px",fontWeight:"bold",margin:"0 0 4px",color:T.text}}>Account Settings</h1>
            <p style={{fontSize:"14px",color:T.muted,margin:0}}>Manage your profile and account preferences.</p>
          </div>
          <div style={{borderRadius:"16px",border:`1px solid ${T.border}`,background:T.card,padding:"24px"}}>
            <form onSubmit={handleSave} style={{display:"flex",flexDirection:"column",gap:"20px"}}>
              {[{label:"Full Name",value:name,onChange:setName,type:"text"},{label:"Email",value:email,onChange:setEmail,type:"email"},{label:"Role",value:role,onChange:setRole,type:"text"}].map(field => (
                <div key={field.label} style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                  <label style={{fontSize:"12px",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:T.muted}}>{field.label}</label>
                  <input type={field.type} value={field.value} onChange={e=>field.onChange(e.target.value)} style={inputStyle}
                    onFocus={e=>e.currentTarget.style.borderColor=T.accent} onBlur={e=>e.currentTarget.style.borderColor=T.border}/>
                </div>
              ))}
              <button type="submit" style={{background:saved?T.green:T.accent,color:"white",fontWeight:600,padding:"10px 24px",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"14px",alignSelf:"flex-start",transition:"background 0.3s"}}>
                {saved ? "Saved!" : "Save Changes"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [user, setUser] = useState(null);
      const [page, setPage] = useState("dashboard");
      const [selectedContent, setSelectedContent] = useState(null);
      const [quizResult, setQuizResult] = useState(null);

      if (!user) return <Login onLogin={u=>setUser(u)} />;

      function navigate(to) { setPage(to); setSelectedContent(null); setQuizResult(null); }
      function handleSelectContent(item) { setSelectedContent(item); setQuizResult(null); setPage("content"); }
      function handleStartQuiz(item) { setPage("quiz"); }
      function handleQuizComplete(result) { setQuizResult(result); setPage("results"); }

      function renderPage() {
        switch (page) {
          case "dashboard": return <Dashboard onSelectContent={handleSelectContent} />;
          case "library":   return <Library onSelectContent={handleSelectContent} />;
          case "content":   return <ContentDetail item={selectedContent} onBack={()=>navigate("library")} onStartQuiz={handleStartQuiz} />;
          case "quiz":      return <Quiz item={selectedContent} onBack={()=>setPage("content")} onComplete={handleQuizComplete} />;
          case "results":   return <Results result={quizResult} item={selectedContent} onBack={()=>setPage("quiz")} onGoLibrary={()=>navigate("library")} />;
          case "profile":   return <Profile user={user} onUpdate={setUser} />;
          default:          return <Dashboard onSelectContent={handleSelectContent} />;
        }
      }

      return (
        <div style={{minHeight:"100vh",background:T.bg}}>
          <Header currentPage={page} onNavigate={navigate} user={user} onLogout={()=>setUser(null)} />
          <div style={{paddingTop:"56px"}}>
            <div style={{margin:"0 auto",maxWidth:"1255px",padding:"24px 20px",display:"flex",alignItems:"flex-start",gap:"20px"}}>
              <Sidebar currentPage={page} onNavigate={navigate} user={user} />
              <main style={{flex:1,minWidth:0}}>
                {renderPage()}
              </main>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
